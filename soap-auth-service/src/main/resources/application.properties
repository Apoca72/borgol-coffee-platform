# Railway sets PORT automatically. Locally defaults to 8081.
server.port=${PORT:8081}
spring.application.name=soap-auth-service

# JWT secret – must match cafe-project's JwtUtil secret for cross-service compatibility
jwt.secret=borgol-coffee-platform-jwt-secret-2026-num
jwt.expiry-days=7

# Console output
logging.level.root=INFO
logging.level.org.springframework.ws=DEBUG
