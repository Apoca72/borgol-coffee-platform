name: Build & Deploy — Borgol Coffee Platform

on:
  push:
    branches:
      - main
      - feature/borgol-platform
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1: Build & Test (JSON service) ──────────────────────────────────────
  build:
    name: Build & Test (cafe-project)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR
        run: mvn package -DskipTests -B -q

      - name: Run tests
        run: mvn test -B

      - name: Verify JAR has Main-Class
        run: |
          unzip -p target/cafe-project-1.0-SNAPSHOT.jar META-INF/MANIFEST.MF | grep "Main-Class"
          echo "✅ JAR is executable"

  # ── Job 2: Build & Test (SOAP auth service) ─────────────────────────────────
  build-soap:
    name: Build & Test (soap-auth-service)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build SOAP service
        working-directory: soap-auth-service
        run: mvn package -DskipTests -B -q

  # ── Job 3: Deploy to Railway (only on push, not PRs) ────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build, build-soap]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy cafe-project (JSON + Frontend)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach

      - name: Deploy soap-auth-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: soap-auth-service
        run: railway up --service ${{ secrets.RAILWAY_SOAP_SERVICE_ID }} --detach
