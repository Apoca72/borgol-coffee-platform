# Railway deployment configuration — Borgol SOAP Auth Service
# Forces Railway to use the Dockerfile instead of auto-detect (Nixpacks)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
