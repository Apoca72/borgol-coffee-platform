<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel – Borgol Coffee</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
:root {
  --espresso  : #0C0400;
  --roast     : #2B1005;
  --caramel   : #A8621E;
  --caramel-lt: #CB8840;
  --gold      : #E8A030;
  --amber     : #F5C060;
  --cream     : #F6E8CC;
  --milk      : #FDFAF3;
  --surface   : #FFFEF8;
  --border    : #EDDBBA;
  --muted     : #8A7054;
  --text      : #180F08;
  --success   : #2D6A4F;
  --error     : #B5321E;
  --shadow    : 0 2px 16px rgba(12,4,0,.08);
  --shadow-md : 0 6px 30px rgba(12,4,0,.13);
  --radius    : 14px;
  --radius-lg : 20px;
  --font-serif: 'Playfair Display', Georgia, serif;
  --font-sans : 'DM Sans', -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; background: var(--milk); color: var(--text); font-family: var(--font-sans); }

@keyframes slideDown { from { opacity:0; transform:translateY(-14px) } to { opacity:1; transform:none } }
@keyframes fadeUp    { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }
@keyframes spin      { to { transform:rotate(360deg) } }
@keyframes shimmer   { from { background-position:200% 0 } to { background-position:-200% 0 } }

/* ── Navbar ─────────────────────────────────────────── */
.navbar {
  background: linear-gradient(135deg, var(--espresso) 0%, #1A0800 100%);
  height: 62px; display: flex; align-items: center;
  padding: 0 28px; gap: 16px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 24px rgba(0,0,0,.45);
  animation: slideDown .4s ease;
}
.nav-brand {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-serif); font-size: 19px; font-weight: 700;
  color: #fff; text-decoration: none;
}
.nav-brand span { font-size: 22px; }
.admin-badge {
  padding: 3px 10px; border-radius: 20px;
  background: rgba(232,160,48,.2); border: 1px solid rgba(232,160,48,.4);
  color: var(--amber); font-size: 11px; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase;
}
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.btn-back {
  padding: 7px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  color: rgba(255,255,255,.75); background: none;
  border: 1.5px solid rgba(255,255,255,.25);
  cursor: pointer; font-family: inherit; transition: .2s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.btn-back:hover { background: rgba(255,255,255,.1); color: #fff; border-color: rgba(255,255,255,.5); }

/* ── Layout ─────────────────────────────────────────── */
.page {
  max-width: 1100px; margin: 0 auto;
  padding: 40px 24px 80px;
  animation: fadeUp .4s ease both;
}
.page-title {
  font-family: var(--font-serif); font-size: 2rem; color: var(--roast);
  margin-bottom: 6px; display: flex; align-items: center; gap: 12px;
}
.page-sub { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }

/* ── Stats grid ─────────────────────────────────────── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 32px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 24px;
  box-shadow: var(--shadow);
}
.stat-label { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.stat-value { font-family: var(--font-serif); font-size: 2.2rem; color: var(--caramel); font-weight: 700; }
.stat-value.red { color: var(--error); }

/* ── Filter tabs ─────────────────────────────────────── */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: var(--surface); padding: 4px; border-radius: var(--radius);
  border: 1px solid var(--border); width: fit-content;
}
.tab {
  padding: 8px 18px; border-radius: 10px; border: none; background: none;
  font-family: var(--font-sans); font-size: .85rem; font-weight: 600;
  color: var(--muted); cursor: pointer; transition: all .2s;
}
.tab.active { background: var(--caramel); color: #fff; box-shadow: 0 2px 8px rgba(168,98,30,.3); }
.tab:not(.active):hover { background: var(--cream); color: var(--caramel); }
.tab-count {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 10px; font-weight: 700; margin-left: 5px;
  background: rgba(255,255,255,.25);
}
.tab:not(.active) .tab-count { background: var(--cream); color: var(--caramel); }

/* ── Reports table ─────────────────────────────────── */
.reports-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  box-shadow: var(--shadow-md);
}
.reports-table { width: 100%; border-collapse: collapse; }
.reports-table th {
  text-align: left; padding: 14px 20px;
  font-size: .72rem; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--muted);
  background: var(--cream); border-bottom: 1px solid var(--border);
}
.reports-table td {
  padding: 16px 20px; vertical-align: top;
  border-bottom: 1px solid var(--border); font-size: .875rem;
}
.reports-table tr:last-child td { border-bottom: none; }
.reports-table tr:hover td { background: rgba(168,98,30,.03); }

.reporter { font-weight: 600; color: var(--roast); }
.report-reason { font-weight: 600; color: var(--text); margin-bottom: 4px; }
.report-desc { color: var(--muted); font-size: .8rem; line-height: 1.4; }
.content-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 12px;
  font-size: .72rem; font-weight: 600;
  background: var(--cream); color: var(--caramel);
  border: 1px solid rgba(168,98,30,.2);
}
.content-tag.post   { background: rgba(26,92,168,.08); color: #1A5CA8; border-color: rgba(26,92,168,.2); }
.content-tag.user   { background: rgba(45,106,79,.08); color: var(--success); border-color: rgba(45,106,79,.2); }
.content-tag.recipe { background: rgba(232,160,48,.1); color: #9a6800; border-color: rgba(232,160,48,.3); }
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: .72rem; font-weight: 700; letter-spacing: .02em;
}
.status-badge.pending    { background: rgba(181,50,30,.08); color: var(--error); border: 1px solid rgba(181,50,30,.2); }
.status-badge.resolved   { background: rgba(45,106,79,.08); color: var(--success); border: 1px solid rgba(45,106,79,.2); }
.status-badge.dismissed  { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
.timestamp { font-size: .75rem; color: var(--muted); }

/* ── Actions ─────────────────────────────────────────── */
.action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-resolve {
  padding: 6px 14px; border-radius: 8px; border: none;
  font-size: .78rem; font-weight: 600; cursor: pointer;
  font-family: var(--font-sans); transition: all .18s;
}
.btn-resolve.confirm {
  background: var(--success); color: #fff;
}
.btn-resolve.confirm:hover { background: #1f4f39; }
.btn-resolve.dismiss {
  background: none; color: var(--muted);
  border: 1.5px solid var(--border);
}
.btn-resolve.dismiss:hover { background: var(--cream); color: var(--text); border-color: var(--caramel-lt); }
.btn-resolve:disabled { opacity: .45; cursor: not-allowed; }

/* ── Empty / loading states ─────────────────────────── */
.empty-state {
  text-align: center; padding: 64px 24px;
  font-family: var(--font-serif); color: var(--muted);
}
.empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p { font-size: 1.1rem; }

.skeleton {
  background: linear-gradient(90deg, var(--cream) 25%, var(--border) 50%, var(--cream) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
}
.sk-row td { padding: 20px; }
.sk-line { height: 14px; border-radius: 6px; }

/* ── Toast ───────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--roast); color: #fff; padding: 12px 24px; border-radius: var(--radius);
  font-size: .875rem; font-weight: 600; z-index: 9999;
  box-shadow: var(--shadow-md); opacity: 0;
  transition: opacity .3s, transform .3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.toast.error   { background: var(--error); }

/* ── Access denied ───────────────────────────────────── */
#access-denied {
  display: none; text-align: center; padding: 100px 24px;
}
#access-denied .icon { font-size: 4rem; margin-bottom: 20px; }
#access-denied h2 { font-family: var(--font-serif); font-size: 1.8rem; color: var(--error); margin-bottom: 8px; }
#access-denied p { color: var(--muted); }

@media(max-width:700px) {
  .reports-table th:nth-child(4),
  .reports-table td:nth-child(4) { display: none; }
  .page { padding: 24px 14px 60px; }
  .page-title { font-size: 1.5rem; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand"><span>☕</span> Borgol</a>
  <span class="admin-badge">Admin</span>
  <div class="nav-right">
    <a href="index.html" class="btn-back">← Back to App</a>
  </div>
</nav>

<div id="access-denied">
  <div class="icon">🔒</div>
  <h2>Access Denied</h2>
  <p>You don't have admin privileges to view this page.</p>
</div>

<div class="page" id="admin-page" style="display:none">
  <div class="page-title">⚙️ Admin Panel</div>
  <p class="page-sub">Manage community reports and moderate content</p>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Pending Reports</div>
      <div class="stat-value red" id="stat-pending">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Resolved</div>
      <div class="stat-value" id="stat-resolved">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Dismissed</div>
      <div class="stat-value" id="stat-dismissed">—</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab active" data-status="pending" onclick="switchTab('pending')">
      Pending <span class="tab-count" id="tab-count-pending">0</span>
    </button>
    <button class="tab" data-status="resolved" onclick="switchTab('resolved')">
      Resolved
    </button>
    <button class="tab" data-status="dismissed" onclick="switchTab('dismissed')">
      Dismissed
    </button>
  </div>

  <!-- Reports table -->
  <div class="reports-wrap">
    <table class="reports-table">
      <thead>
        <tr>
          <th>Reporter</th>
          <th>Content</th>
          <th>Reason &amp; Description</th>
          <th>Date</th>
          <th>Status / Actions</th>
        </tr>
      </thead>
      <tbody id="reports-body">
        <!-- skeleton rows -->
        <tr class="sk-row"><td><div class="skeleton sk-line" style="width:80px"></div></td><td><div class="skeleton sk-line" style="width:60px"></div></td><td><div class="skeleton sk-line" style="width:180px"></div></td><td><div class="skeleton sk-line" style="width:80px"></div></td><td><div class="skeleton sk-line" style="width:120px"></div></td></tr>
        <tr class="sk-row"><td><div class="skeleton sk-line" style="width:100px"></div></td><td><div class="skeleton sk-line" style="width:50px"></div></td><td><div class="skeleton sk-line" style="width:200px"></div></td><td><div class="skeleton sk-line" style="width:80px"></div></td><td><div class="skeleton sk-line" style="width:120px"></div></td></tr>
        <tr class="sk-row"><td><div class="skeleton sk-line" style="width:70px"></div></td><td><div class="skeleton sk-line" style="width:65px"></div></td><td><div class="skeleton sk-line" style="width:160px"></div></td><td><div class="skeleton sk-line" style="width:80px"></div></td><td><div class="skeleton sk-line" style="width:120px"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
const token = () => localStorage.getItem('token');

// ── Auth guard ──────────────────────────────────────
async function init() {
  const t = token();
  if (!t) { location.href = 'login.html'; return; }

  try {
    const r = await fetch(`${API}/admin/stats`, {
      headers: { Authorization: `Bearer ${t}` }
    });
    if (r.status === 403 || r.status === 401) {
      document.getElementById('access-denied').style.display = 'block';
      return;
    }
    if (!r.ok) throw new Error();
    const data = await r.json();
    document.getElementById('admin-page').style.display = 'block';
    document.getElementById('stat-pending').textContent = data.pendingReports ?? 0;
    document.getElementById('tab-count-pending').textContent = data.pendingReports ?? 0;
    loadReports('pending');
    loadCounts();
  } catch(e) {
    showToast('Failed to load admin panel', 'error');
  }
}

// ── Load counts for all tabs ─────────────────────────
async function loadCounts() {
  const statuses = ['resolved', 'dismissed'];
  for (const s of statuses) {
    try {
      const r = await fetch(`${API}/admin/reports?status=${s}`, {
        headers: { Authorization: `Bearer ${token()}` }
      });
      if (!r.ok) continue;
      const list = await r.json();
      const el = document.getElementById(`stat-${s}`);
      if (el) el.textContent = list.length;
    } catch {}
  }
}

// ── Current tab ──────────────────────────────────────
let currentStatus = 'pending';

function switchTab(status) {
  currentStatus = status;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.status === status);
  });
  loadReports(status);
}

// ── Load reports ─────────────────────────────────────
async function loadReports(status) {
  const tbody = document.getElementById('reports-body');
  tbody.innerHTML = skeletonRows(4);

  try {
    const r = await fetch(`${API}/admin/reports?status=${status}`, {
      headers: { Authorization: `Bearer ${token()}` }
    });
    if (!r.ok) throw new Error();
    const reports = await r.json();
    renderReports(reports, status);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">⚠️</div><p>Failed to load reports</p></div></td></tr>`;
  }
}

function skeletonRows(n) {
  const widths = [80,60,180,80,120];
  return Array.from({length:n}, () =>
    `<tr class="sk-row">${widths.map(w =>
      `<td><div class="skeleton sk-line" style="width:${w}px"></div></td>`
    ).join('')}</tr>`
  ).join('');
}

function renderReports(reports, status) {
  const tbody = document.getElementById('reports-body');
  if (!reports.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <div class="icon">${status === 'pending' ? '✅' : '📭'}</div>
      <p>${status === 'pending' ? 'No pending reports — all clear!' : `No ${status} reports yet`}</p>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = reports.map(r => {
    const isPending = r.status === 'pending';
    const dateStr = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) : '—';
    const contentTypeClass = (r.content_type||'').toLowerCase();

    const actions = isPending
      ? `<div class="action-btns">
           <button class="btn-resolve confirm" onclick="resolveReport(${r.id},'resolved',this)">✓ Resolve</button>
           <button class="btn-resolve dismiss" onclick="resolveReport(${r.id},'dismissed',this)">Dismiss</button>
         </div>`
      : `<span class="status-badge ${r.status}">${r.status === 'resolved' ? '✓ Resolved' : 'Dismissed'}</span>`;

    return `<tr>
      <td><span class="reporter">@${escHtml(r.reporter_username || r.reporter_id || 'Unknown')}</span></td>
      <td>
        <span class="content-tag ${contentTypeClass}">${escHtml(r.content_type || '—')}</span>
        <div style="font-size:.75rem;color:var(--muted);margin-top:4px">#${r.content_id}</div>
      </td>
      <td>
        <div class="report-reason">${escHtml(r.reason || '—')}</div>
        ${r.description ? `<div class="report-desc">${escHtml(r.description)}</div>` : ''}
      </td>
      <td><span class="timestamp">${dateStr}</span></td>
      <td>${actions}</td>
    </tr>`;
  }).join('');
}

// ── Resolve / dismiss ─────────────────────────────────
async function resolveReport(id, action, btn) {
  const row = btn.closest('tr');
  const btns = row.querySelectorAll('.btn-resolve');
  btns.forEach(b => b.disabled = true);

  try {
    const r = await fetch(`${API}/admin/reports/${id}/resolve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token()}` },
      body: JSON.stringify({ action })
    });
    if (!r.ok) throw new Error();

    showToast(action === 'resolved' ? 'Report resolved' : 'Report dismissed', 'success');

    // Refresh pending count
    const statsR = await fetch(`${API}/admin/stats`, { headers: { Authorization: `Bearer ${token()}` } });
    if (statsR.ok) {
      const stats = await statsR.json();
      document.getElementById('stat-pending').textContent = stats.pendingReports ?? 0;
      document.getElementById('tab-count-pending').textContent = stats.pendingReports ?? 0;
    }

    // Reload current tab
    loadReports(currentStatus);
    loadCounts();
  } catch(e) {
    showToast('Action failed', 'error');
    btns.forEach(b => b.disabled = false);
  }
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show${type ? ' ' + type : ''}`;
  setTimeout(() => t.className = 'toast', 2800);
}

// ── Escape HTML ───────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
